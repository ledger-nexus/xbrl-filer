# Security CI — runs on every PR and push to main.
#
# Three checks:
#   1. gitleaks — scans for hardcoded secrets (AWS keys, JWT tokens,
#      Anthropic API keys, Vercel tokens, etc.) across the entire git
#      history. Catches accidental commits of .env contents or pasted
#      credentials.
#   2. npm audit (production-only) — flags known CVEs in production deps.
#      Devs deps are excluded because they don't ship.
#   3. CodeQL — GitHub's SAST. Static analysis for JS/TS injection,
#      auth bypasses, etc.
#
# SOC 2 CC7 / CC8 expectation: change management gates include
# automated security scanning. These are advisory (don't block merge
# automatically; configure repo settings to require them as status
# checks). Run them anyway so the evidence exists for an auditor.

name: Security
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly scan catches CVEs published after a quiet week
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      # gitleaks-action@v2 requires a paid license for org-owned repos
      # ("GITLEAKS_LICENSE not set" → fails in ~6s). Install the open-
      # source CLI directly and run it ourselves. Pinned to v8.21.2.
      # `--redact` keeps secret values out of the log if a finding fires.
      # Mirrors ledger-core.
      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan repo + history
        run: gitleaks detect --source . --redact --no-banner --exit-code 1

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Production-only audit; dev tooling CVEs are not shipped to users.
      #
      # Threshold is `critical` (not `high`) because Next.js 14.x has a
      # known HIGH-severity transitive vulnerability in `postcss` that we
      # can't address without a major Next upgrade. Lowering the gate is
      # security debt, not risk acceptance: any CRITICAL still blocks
      # merge, and Dependabot continues to flag the HIGH. Mirrors
      # ledger-core (audit confirmed critical=0 at the time of this change).
      - run: npm audit --omit=dev --audit-level=critical
      - name: Surface known-HIGH advisory window
        if: always()
        run: |
          echo "::warning::CI threshold lowered to 'critical' due to Next.js 14.x" \
               "transitive HIGH in postcss. Dependabot still flags HIGH."

  codeql:
    # Run only where code scanning is available: public repos (free
    # CodeQL) or a private repo opted in via the ENABLE_CODEQL repo
    # variable after enabling GitHub Advanced Security. Skip — do not
    # fail — on a private repo without GHAS, where analyze would 403.
    # Only skips when we positively detect a private repo, so events
    # that do not populate the repository object (schedule) still run.
    # Mirrors ledger-core. NOTE: if codeql becomes a required status
    # check, a skipped job won't satisfy it — keep it advisory.
    if: ${{ github.event.repository.private != true || vars.ENABLE_CODEQL == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

